# Make sure terminal colors work with kitty
set-option -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"

# reduce lag
set-option -s escape-time 0

# enable clipboard passthrough
set -s set-clipboard on
set -g allow-passthrough on

# Allow mouse scrolling
set -g mouse on
# For neovim 'autoread' recommended by :checkhealth
set-option -g focus-events on

bind-key -r r source ~/.tmux.conf 
# To move between panes
bind-key -r j select-pane -U
bind-key -r k select-pane -D
bind-key -r h select-pane -L
bind-key -r l select-pane -R

# To move panes
bind-key -r C-j select-pane -U \; swap-pane -d -s '!' 
bind-key -r C-k select-pane -D \; swap-pane -d -s '!' 
bind-key -r C-h select-pane -L \; swap-pane -d -s '!' 
bind-key -r C-l select-pane -R \; swap-pane -d -s '!' 

# To resize panes
bind-key -r J resize-pane -U
bind-key -r K resize-pane -D
bind-key -r H resize-pane -L
bind-key -r L resize-pane -R

# vi keys for navigating in copy mode
set-option -g mode-keys vi
